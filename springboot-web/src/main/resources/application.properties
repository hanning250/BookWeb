# Database configuration: prefer environment variables. Example env names: BMS_DB_USER, BMS_DB_PASSWORD, BMS_DB_HOST, BMS_DB_PORT, BMS_DB_NAME
spring.datasource.url=jdbc:mysql://${BMS_DB_HOST:localhost}:${BMS_DB_PORT:3306}/${BMS_DB_NAME:bms}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${BMS_DB_USER:root}
spring.datasource.password=${BMS_DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA behavior: update schema to match entities (convenient for development)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=8080